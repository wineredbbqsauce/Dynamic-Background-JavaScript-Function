<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallpaper</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card">
      <!-- MAC STYLE -->
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>

      <!-- WINDOWS STYLE -->
      <!-- <div class="windows-controls">
        <button class="win-btn win-min">−</button>
        <button class="win-btn win-min">▢</button>
        <button class="win-btn win-min">✕</button>
      </div> -->

      <!--
        KOMMENTER UT OM DU ØNSKER Å HA ENTEN windows STYLE KNAPPER 
        ELLER 
        OM DU ØNSKER mac STYLE KNAPPER

        DU KAN OGSÅ KOMMENTERE UT BEGGE HVIS DU IKKE ØNSKER NOEN AV DEM
      -->
      <div class="tab">caffeineOverload.js</div>

      <div class="code-block">
        <!-- line 1 -->
        <div class="ln">1</div>
        <div class="line">
          <span class="kw">const</span>
          <span class="cn">showDate</span>
          <span class="pun">=</span>
          <span class="pun">{</span>
        </div>

        <!-- year -->
        <div class="ln">2</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">year</span><span class="pun">:</span>
          <span class="num" id="year">—</span><span class="pun">,</span>
        </div>

        <!-- month -->
        <div class="ln">3</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">month</span><span class="pun">:</span>
          <span class="num" id="month">—</span><span class="pun">,</span>
        </div>
        <!-- Week -->
        <div class="ln">4</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">week</span><span class="pun">:</span>
          <span class="num" id="week">—</span><span class="pun">,</span>
        </div>

        <!-- date -->
        <div class="ln">5</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">date</span><span class="pun">:</span>
          <span class="num" id="date">—</span><span class="pun">,</span>
        </div>

        <!-- day -->
        <div class="ln">6</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">day</span><span class="pun">:</span>
          <span class="str">"<span id="day">—</span>"</span
          ><span class="pun">,</span>
        </div>

        <!-- hour -->
        <div class="ln">7</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">hour</span><span class="pun">:</span>
          <span class="num" id="hour">—</span><span class="pun">,</span>
        </div>

        <!-- minute -->
        <div class="ln">8</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">minute</span><span class="pun">:</span>
          <span class="num" id="minute">—</span><span class="pun">,</span>
        </div>

        <!-- second -->
        <div class="ln">9</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">second</span><span class="pun">:</span>
          <span class="num cursor" id="second">—</span
          ><span class="pun">,</span>
        </div>

        <!-- occupation (static joke) -->
        <div class="ln">10</div>
        <div class="line" style="padding-left: 1.6em">
          <span class="key">occupation</span><span class="pun">:</span>
          <span class="str">"<span id="occupation">Caffeine</span>"</span>
          <span class="cmt">// always</span>
        </div>

        <!-- closing brace -->
        <div class="ln">11</div>
        <div class="line">
          <span class="pun">}</span>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
